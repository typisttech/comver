name: Go Generate

on:
  workflow_dispatch:
  schedule:
    - cron: 23 3 * * 1 # Weekly on Monday
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: 'go.mod'

      - run: go generate ./...

      - uses: typisttech/.github/.github/actions/create-auto-merged-pull-request@7b89b88a2e9768adc532a741ec37de5921ad248e # v5.1.1
        with:
          app-id: ${{ vars.TASTENDRUCK_APP_ID }}
          private-key: ${{ secrets.TASTENDRUCK_PRIVATE_KEY }}
          branch: "tastendruck/github_actions/go-generate/${{ github.ref_name }}"
          title: ":robot: `go generate ./...`"
          labels: go-generate
